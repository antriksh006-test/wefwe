<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quote Generator</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #quote-box { border: 2px solid #333; padding: 20px; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="quote-box">
        <h2 id="text">Press the button to get a quote!</h2>
        <p id="author"></p>
        <button onclick="fetchQuote()">New Quote</button>
    </div>

    <script>
       async function fetchQuote() {
    try {
        // Adding the leading slash / ensures it looks at the root of your server
        const response = await fetch('https://YOUR-VERCEL-URL.vercel.app/api/quote');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        document.getElementById('text').innerText = `"${data.text}"`;
        document.getElementById('author').innerText = `- ${data.author}`;
    } catch (error) {
        console.error("Error fetching quote:", error);
        document.getElementById('text').innerText = "Server not responding. Check the console!";
    }
}
    </script>
</body>
</html>
